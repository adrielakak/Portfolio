<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>
    <style>
        body {
            margin: 0;
            padding: 2rem;
            background-color: #000;
            color: #ccc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            text-align: left;
        }

        .poem {
            max-width: 600px;
            font-size: 1.2rem;
            line-height: 2;
            opacity: 0;
            animation: fadeIn 1s ease forwards;
        }

        .line {
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(10px);
        }

        .p1 { color: #00AAAA; font-weight: bold; } /* Dark Cyan */
        .p2 { color: #00AA00; font-weight: bold; } /* Dark Green */

        /* Cascading fade in for each line */
        .line:nth-child(1) { animation: slideUp 2s forwards 0.5s; }
        .line:nth-child(2) { animation: slideUp 2s forwards 2.5s; }
        .line:nth-child(3) { animation: slideUp 2s forwards 5.0s; }
        .line:nth-child(4) { animation: slideUp 2s forwards 8.0s; }
        .line:nth-child(5) { animation: slideUp 2s forwards 11.0s; }

        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="poem">
        <div class="line p1">Je vois le visiteur dont tu parles.</div>
        <div class="line p2">Oui, celui qui a déverrouillé la table.</div>
        <div class="line p1">Il a maîtrisé les Données et l'Algorithme.</div>
        <div class="line p2">Il est donc temps qu'il découvre la véritable fondation de cet univers.</div>
        <div class="line p1">Réveille-toi. Ce n'est qu'un rêve...</div>
    </div>

    <script>
        // Redirect to Rickroll right after the last line is fully read
        setTimeout(() => {
            document.body.style.transition = "opacity 1s";
            document.body.style.opacity = 0;
            setTimeout(() => {
                window.location.replace("https://www.youtube.com/watch?v=dQw4w9WgXcQ&autoplay=1");
            }, 1000);
        }, 14000); // 14s total to read the short poem before rickroll fades in
    </script>
</body>
</html>

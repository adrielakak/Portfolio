<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>???</title>
    <style>
        body {
            background-color: #0d0016; /* Nether/End darkness */
            color: #aaaaaa;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            padding: 20px;
        }

        .end-poem {
            max-width: 600px;
            font-size: 1.2rem;
            line-height: 1.8;
            opacity: 0;
            animation: fadeIn 3s ease forwards;
        }

        .player-name {
            color: #5ce1f5;
            font-weight: bold;
        }

        .highlight {
            color: #7ab648;
        }

        h1 {
            color: #d4a05a;
            font-size: 2rem;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 0 #4a3c2a;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Dirt loading bar */
        .loading-container {
            width: 300px;
            height: 10px;
            background: #222;
            border: 2px solid #555;
            margin-top: 3rem;
            border-radius: 5px;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 1s ease 2s forwards;
        }

        .loading-bar {
            height: 100%;
            background: #7ab648;
            width: 0%;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>
    <div class="end-poem">
        <h1>Dragon de l'Ender vaincu !</h1>
        <p>Merci d'avoir exploré mon site, <span class="player-name">Aventurier</span>.</p>
        <p>Félicitations, tu as crafté la victoire.</p>
        <p>Voici ta <span class="highlight">récompense bien méritée</span>...</p>
        
        <div class="loading-container">
            <div class="loading-bar" id="loading-bar"></div>
        </div>
    </div>

    <script>
        // Animate the loading bar and redirect to Rickroll (bypasses adblock since it's a direct HTML meta/js redirect from a user-initiated page load)
        const bar = document.getElementById("loading-bar");
        let progress = 0;
        
        setTimeout(() => {
            const interval = setInterval(() => {
                progress += Math.random() * 5 + 2;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    // Redirect to the rickroll in the same tab to avoid popup blockers
                    window.location.replace("https://www.youtube.com/watch?v=dQw4w9WgXcQ&autoplay=1");
                }
                bar.style.width = progress + "%";
            }, 100);
        }, 3000); // 3 seconds to read
    </script>
</body>
</html>
